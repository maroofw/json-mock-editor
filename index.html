<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Mock Editor | Android Studio Network Inspector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Mock Responses</h2>
                <button id="new-mock-btn" class="btn btn-primary btn-icon" title="New Mock">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
            <ul class="mock-list" id="mock-list">
                <!-- Mock items injected by JS -->
            </ul>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace">
            <!-- Toolbar -->
            <header class="toolbar">
                <div class="toolbar-left">
                    <input type="text" id="mock-name" placeholder="Untitled Mock" class="mock-name-input" />
                    <span id="save-status" class="status-badge">Unsaved</span>
                </div>
                <div class="toolbar-right">
                    <button id="format-btn" class="btn btn-secondary">Prettify</button>
                    <button id="minify-btn" class="btn btn-secondary">Minify</button>
                    <button id="save-btn" class="btn btn-primary">Save</button>
                    <button id="copy-btn" class="btn btn-accent btn-icon" title="Copy for Android Studio">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        <span>Copy Mock</span>
                    </button>
                </div>
            </header>

            <!-- Editor Area -->
            <div class="editor-container">
                <div class="editor-tabs">
                    <button class="tab-btn active" data-target="raw-editor">Raw JSON</button>
                    <button class="tab-btn" data-target="tree-editor">Tree View</button>
                </div>
                
                <div class="editor-panes">
                    <!-- Raw Editor Pane -->
                    <div id="raw-editor" class="pane active">
                        <textarea id="json-input" placeholder="Paste your JSON here..." spellcheck="false"></textarea>
                    </div>
                    
                    <!-- Tree Editor Pane -->
                    <div id="tree-editor" class="pane">
                        <div id="tree-container" class="tree-container">
                            <div class="tree-placeholder">Enter valid JSON in the Raw tab to view the tree.</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status/Error Bar -->
            <footer class="status-bar">
                <div id="validation-msg" class="validation-msg success">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span>Valid JSON</span>
                </div>
                <div class="status-right">
                    <span id="char-count">0 chars</span>
                </div>
            </footer>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
